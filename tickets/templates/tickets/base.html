<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Tickets</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #111827;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-verde {
            background: #16a34a;
        }

        .btn-gris {
            background: #6b7280;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #374151;
            color: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .card {
            display: inline-block;
            width: 22%;
            padding: 15px;
            margin: 10px;
            background: #e5e7eb;
            border-radius: 8px;
            text-align: center;
            vertical-align: top;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        label {
            font-weight: bold;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
        }

        .estado-abierto {
            background: #dc2626;
        }

        .estado-proceso {
            background: #f59e0b;
        }

        .estado-resuelto {
            background: #16a34a;
        }

        .estado-cerrado {
            background: #374151;
        }

        .prioridad-alta {
            background: #b91c1c;
        }

        .prioridad-media {
            background: #d97706;
        }

        .prioridad-baja {
            background: #2563eb;
        }

        .form-box {
            max-width: 700px;
            margin: 0 auto;
            background: #f9fafb;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .titulo-formulario {
            text-align: center;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .acciones-formulario {
            margin-top: 20px;
            text-align: center;
        }

        .detalle-box {
            max-width: 800px;
            margin: 0 auto;
            background: #f9fafb;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .detalle-box p {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .mensaje-exito {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>Sistema de Tickets de Soporte</h1>
    <p>Registro y seguimiento de reportes técnicos</p>
</header>

<nav>
    <a href="{% url 'inicio' %}">Inicio</a>
    <a href="{% url 'crear_ticket' %}">Nuevo Ticket</a>
    <a href="{% url 'reporte_tickets' %}">Reportes</a>
    <a href="/admin/">Administrador</a>
</nav>

<div class="container">

    {% if messages %}
        {% for message in messages %}
            <div class="mensaje-exito">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block contenido %}
    {% endblock %}

</div>

</body>
</html>
