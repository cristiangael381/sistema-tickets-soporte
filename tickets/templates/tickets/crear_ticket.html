{% extends 'tickets/base.html' %}

{% block contenido %}

<div class="form-box">
    <h2 class="titulo-formulario">Crear nuevo ticket</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="acciones-formulario">
            <button class="btn btn-verde" type="submit">Guardar ticket</button>
            <a class="btn btn-gris" href="{% url 'inicio' %}">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
